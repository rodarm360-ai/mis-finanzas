<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<meta name="robots" content="noindex,nofollow,noarchive"/>
<title>INP El Buen Pastor — Sistema Ministerial</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/tablericons/2.44.0/webfont/tabler-icons.min.css"/>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.8.2/jspdf.plugin.autotable.min.js"></script>
<script src="https://cdn.sheetjs.com/xlsx-0.20.3/package/dist/xlsx.full.min.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:"Segoe UI",system-ui,sans-serif;min-height:100vh;display:flex;background:var(--bg,#F5F3EE);font-size:15px}
#root{display:flex;width:100%;min-height:100vh}
:root{--acc:#C8952A;--accT:#000;--accL:#FBF4E2;--accS:rgba(200,149,42,.15);--sb:#0A0A0A;--sbT:#fff;--sbM:rgba(255,255,255,.35);--sbH:rgba(255,255,255,.08);--sbB:rgba(255,255,255,.1);--bg:#F5F3EE;--sur:#fff;--bor:#E8E3DB;--t1:#1A1010;--t2:#4A3D2E;--t3:#8A7A6A}
.tw{position:fixed;top:14px;right:14px;z-index:9999;display:flex;flex-direction:column;gap:7px;pointer-events:none}
.t{background:#1a1a1a;color:#fff;padding:10px 15px;border-radius:10px;font-size:14px;display:flex;align-items:center;gap:8px;box-shadow:0 4px 20px rgba(0,0,0,.25);animation:sIn .2s ease;max-width:340px;pointer-events:all}
.t.success{border-left:4px solid #2ecc71}.t.error{border-left:4px solid #e74c3c}.t.info{border-left:4px solid #3498db}
@keyframes sIn{from{transform:translateX(110%);opacity:0}to{transform:translateX(0);opacity:1}}
.lwrap{display:flex;align-items:center;justify-content:center;min-height:100vh;width:100%;background:linear-gradient(135deg,#0A0A0A 0%,#1a0d05 50%,#0A0A0A 100%);position:relative;overflow:hidden}
.lbg{position:absolute;inset:0;opacity:.06;background-image:repeating-linear-gradient(45deg,#C8952A 0,#C8952A 1px,transparent 0,transparent 50%);background-size:20px 20px}
.lcard{background:#fff;border-radius:22px;padding:40px 36px;max-width:440px;width:100%;box-shadow:0 24px 80px rgba(0,0,0,.4);position:relative;z-index:1}
.llogo{width:96px;height:96px;border-radius:50%;overflow:hidden;border:3px solid #C8952A;margin:0 auto 16px;background:#000;display:flex;align-items:center;justify-content:center}
.llogo img{width:100%;height:100%;object-fit:cover}
.lh1{font-size:22px;font-weight:900;color:#0A0A0A;text-align:center;margin-bottom:4px}
.lsub{font-size:14px;color:#8A7A6A;text-align:center;margin-bottom:10px}
.lpriv{background:#f0f4ff;border:1px solid #c0cce8;border-radius:8px;padding:10px 14px;font-size:12.5px;color:#2a4080;margin-bottom:22px;display:flex;align-items:center;gap:8px}
.llbl{font-size:13px;font-weight:700;color:#4A3D2E;display:block;margin-bottom:6px;text-transform:uppercase;letter-spacing:.05em}
.lsel{width:100%;padding:12px 13px;border:2px solid #E8E3DB;border-radius:10px;font-size:15px;color:#1A1010;background:#fff;outline:none;margin-bottom:16px;cursor:pointer;transition:.15s}
.lsel:focus{border-color:#C8952A}
.pwrap{position:relative;margin-bottom:20px}
.pinp{width:100%;padding:12px 42px 12px 14px;border:2px solid #E8E3DB;border-radius:10px;font-size:16px;color:#1A1010;background:#fff;outline:none;transition:.15s;letter-spacing:6px}
.pinp:focus{border-color:#C8952A}
.peye{position:absolute;right:12px;top:50%;transform:translateY(-50%);cursor:pointer;color:#8A7A6A;font-size:20px;background:none;border:none;padding:4px}
.lbtn{width:100%;padding:14px;background:#C8952A;color:#000;border:none;border-radius:10px;font-size:16px;font-weight:800;cursor:pointer;transition:.15s;display:flex;align-items:center;justify-content:center;gap:8px}
.lbtn:hover{background:#a07520;color:#fff}
.lhint{background:#FBF4E2;border:1px solid rgba(200,149,42,.3);border-radius:8px;padding:10px 13px;font-size:13px;color:#9A6B10;margin-top:14px;text-align:center}
.lerr{background:#ffebee;border:1px solid #ffcdd2;border-radius:8px;padding:11px 13px;font-size:14px;color:#c62828;margin-bottom:14px;text-align:center;display:flex;align-items:center;gap:7px}
.sb{width:230px;background:var(--sb);display:flex;flex-direction:column;position:fixed;top:0;left:0;height:100vh;z-index:100;border-right:1px solid var(--sbB);transition:transform .3s ease;overflow-y:auto}
.sblg{display:flex;flex-direction:column;align-items:center;padding:16px 12px 13px;border-bottom:1px solid var(--sbB);gap:8px}
.sbli{width:72px;height:72px;border-radius:50%;overflow:hidden;border:2px solid var(--acc);cursor:pointer;position:relative;flex-shrink:0}
.sbli img{width:100%;height:100%;object-fit:cover}
.sble{position:absolute;bottom:0;right:0;width:20px;height:20px;background:var(--acc);border-radius:50%;display:flex;align-items:center;justify-content:center;color:#000;font-size:10px;border:2px solid var(--sb)}
.sbln{font-size:12.5px;font-weight:800;color:var(--sbT);text-align:center;line-height:1.3}
.sbls{font-size:10.5px;color:var(--acc);text-align:center;font-style:italic}
.snav{flex:1;padding:9px 7px;overflow-y:auto}
.nsc{font-size:9.5px;font-weight:700;color:var(--sbM);letter-spacing:.1em;text-transform:uppercase;padding:10px 10px 4px}
.ni{display:flex;align-items:center;gap:9px;padding:9px 12px;border-radius:8px;cursor:pointer;color:var(--sbM);font-size:13px;font-weight:500;transition:.15s;margin-bottom:2px}
.ni:hover{background:var(--sbH);color:var(--sbT)}
.ni.active{background:var(--acc);color:var(--accT);font-weight:700}
.nic{font-size:17px;width:20px;text-align:center;flex-shrink:0}
.sft{padding:9px 7px;border-top:1px solid var(--sbB)}
.urow{display:flex;align-items:center;gap:8px;padding:8px 10px;border-radius:8px;cursor:pointer}
.urow:hover{background:var(--sbH)}
.uav{width:34px;height:34px;border-radius:50%;background:var(--acc);color:var(--accT);display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:900;flex-shrink:0;overflow:hidden}
.uav img{width:100%;height:100%;object-fit:cover}
.unm{font-size:12.5px;font-weight:700;color:var(--sbT);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.url{font-size:11px;color:var(--acc)}
.lout{display:flex;align-items:center;gap:6px;padding:7px 10px;border-radius:8px;cursor:pointer;color:var(--sbM);font-size:13px;transition:.15s;margin-top:4px}
.lout:hover{background:rgba(255,0,0,.1);color:#ff6b6b}
.mn{margin-left:230px;flex:1;display:flex;flex-direction:column;min-height:100vh}
.tb{height:56px;background:var(--sur);border-bottom:1px solid var(--bor);display:flex;align-items:center;padding:0 22px;gap:10px;position:sticky;top:0;z-index:50}
/* ===== MOBILE ===== */
.hmb{display:none}
.sb-tab{display:none}
.sb-fab{display:none}
/* Overlay oscuro detrás del drawer */
.sbo{display:none;position:fixed;inset:0;z-index:998;background:rgba(0,0,0,.6)}
.sbo.open{display:block}
@media(max-width:768px){
  /* Botón flotante hamburguesa */
  .sb-fab{display:flex;position:fixed;bottom:24px;left:16px;z-index:1000;width:50px;height:50px;border-radius:50%;background:var(--acc);color:var(--accT);border:none;font-size:24px;cursor:pointer;align-items:center;justify-content:center;box-shadow:0 4px 20px rgba(0,0,0,.5)}
  /* Sidebar como drawer oculto por defecto */
  .sb{position:fixed !important;top:0 !important;left:0 !important;height:100vh !important;width:65vw !important;max-width:280px !important;z-index:999 !important;transform:translateX(-100%) !important;transition:transform .3s ease !important;background:#111 !important;box-shadow:none;display:flex !important;flex-direction:column !important;overflow:hidden !important}
  /* Drawer abierto */
  .sb.open{transform:translateX(0) !important;box-shadow:8px 0 40px rgba(0,0,0,.7) !important}
  /* Fondo del sidebar y sus hijos */
  .sb,.sb .sblg,.sb .snav,.sb .sft{background:#111 !important}
  /* Nav scrolleable en móvil */
  .sb .snav{flex:1 !important;overflow-y:auto !important;overflow-x:hidden !important;-webkit-overflow-scrolling:touch !important;min-height:0 !important}
  .sb .sft{flex-shrink:0 !important}
  .sb .sblg{flex-shrink:0 !important}
  /* Texto visible en móvil - forzado con máxima especificidad */
  .sb .ni,.sb .ni span,.sb div.ni,.sb div.ni span{color:#E8E3DB !important;opacity:1 !important;visibility:visible !important;display:flex !important}
  .sb .ni span{display:inline !important}
  .sb .ni{display:flex !important;align-items:center !important;min-height:36px !important}
  .sb .ni i,.sb .ni .nic,.sb div.ni i{color:#C8952A !important;opacity:1 !important;visibility:visible !important}
  .sb .ni.active,.sb div.ni.active,.sb div.ni.active span{background:rgba(200,149,42,.18) !important;color:#C8952A !important}
  .sb .nsc,.sb div.nsc{color:#999 !important;opacity:1 !important;font-size:10px !important;letter-spacing:.08em !important}
  .sb .sbln,.sb div.sbln{color:#E8E3DB !important;opacity:1 !important}
  .sb .sbls,.sb div.sbls{color:#bbb !important;opacity:1 !important}
  .sb .unm,.sb div.unm{color:#E8E3DB !important;opacity:1 !important}
  .sb .url,.sb div.url{color:#bbb !important;opacity:1 !important}
  .sb .lout,.sb div.lout{color:#E8E3DB !important;opacity:1 !important}
  .sb .lout span{color:#E8E3DB !important;opacity:1 !important}
  .sb .snav *{opacity:1 !important;visibility:visible !important}
  /* Contenido principal ocupa toda la pantalla */
  .mn{margin-left:0 !important;width:100% !important}
  .tb{padding:0 12px 0 12px !important}
  .tbt{font-size:13px}
  .pg{padding:12px}
  .sr{grid-template-columns:repeat(2,1fr);gap:10px}
  .dg{grid-template-columns:1fr}
  .cg{grid-template-columns:1fr}
  .lcard{padding:24px 16px;margin:10px;max-width:100%}
  .sc{padding:12px}
  .sv{font-size:22px}
}
.tbt{font-size:15px;font-weight:700;color:var(--t1);flex:1}
.sych{display:flex;align-items:center;gap:5px;font-size:12px;color:var(--acc)}
.btn{display:inline-flex;align-items:center;gap:6px;padding:7px 14px;border-radius:8px;font-size:13px;font-weight:600;cursor:pointer;border:none;transition:.15s;white-space:nowrap}
.ba{background:var(--acc);color:var(--accT)}.ba:hover{filter:brightness(1.1)}
.bo{background:transparent;border:1.5px solid var(--bor);color:var(--t2)}.bo:hover{border-color:var(--acc);color:var(--acc)}
.bsm{padding:5px 11px;font-size:12px}
.br{background:#ffebee;color:#c62828;border:1.5px solid #ffcdd2}.br:hover{background:#c62828;color:#fff}
.ib{width:34px;height:34px;border-radius:8px;border:1px solid var(--bor);background:var(--sur);color:var(--t3);cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:17px;transition:.15s}
.ib:hover{background:var(--accL);color:var(--acc);border-color:var(--acc)}
.badge{display:inline-flex;align-items:center;gap:3px;font-size:12px;font-weight:700;padding:3px 8px;border-radius:20px}
/* ===== DASHBOARD MODAL ===== */
.dm-ov{position:fixed;inset:0;background:rgba(0,0,0,.55);z-index:500;display:flex;align-items:center;justify-content:center;padding:16px;backdrop-filter:blur(3px)}
.dm-box{background:var(--sur);border-radius:18px;width:100%;max-width:520px;max-height:82vh;display:flex;flex-direction:column;box-shadow:0 24px 60px rgba(0,0,0,.3);animation:dmIn .2s ease}
@keyframes dmIn{from{transform:scale(.95);opacity:0}to{transform:scale(1);opacity:1}}
.dm-hd{padding:16px 18px;border-bottom:1px solid var(--bor);display:flex;align-items:center;justify-content:space-between;gap:10px}
.dm-tt{font-size:15px;font-weight:800;color:var(--t1);display:flex;align-items:center;gap:8px}
.dm-bd{overflow-y:auto;flex:1;padding:14px 18px}
.dm-row{display:flex;align-items:center;gap:12px;padding:10px 0;border-bottom:1px solid var(--bor)}
.dm-row:last-child{border-bottom:none}
.dm-av{width:40px;height:40px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:800;flex-shrink:0;overflow:hidden}
.dm-av img{width:100%;height:100%;object-fit:cover}
.dm-inf{flex:1;min-width:0}
.dm-nm{font-size:14px;font-weight:700;color:var(--t1)}
.dm-sb{font-size:12px;color:var(--t3);margin-top:2px}
.sc-cl{cursor:pointer;transition:.15s}
.sc-cl:hover{transform:translateY(-2px);box-shadow:0 4px 16px rgba(0,0,0,.1)}
.bg{background:#e8f5e9;color:#2e7d32}.bred{background:#ffebee;color:#c62828}
.bamb{background:#fff3e0;color:#e65100}.bbl{background:#e3f2fd;color:#1565c0}.bacc{background:var(--accL);color:var(--acc)}
.pg{padding:22px;flex:1}
.ph{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:20px;gap:14px}
.pt{font-size:22px;font-weight:800;color:var(--t1)}
.ps{font-size:14px;color:var(--t3);margin-top:3px}
.pa{display:flex;gap:8px;flex-shrink:0;flex-wrap:wrap}
.sr{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:20px}
.sc{background:var(--sur);border-radius:14px;padding:16px;border:1px solid var(--bor);display:flex;gap:12px;align-items:flex-start}
.si{width:44px;height:44px;border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:20px;flex-shrink:0}
.sv{font-size:28px;font-weight:900;color:var(--t1);line-height:1}
.sl{font-size:12px;color:var(--t3);margin-top:4px}
.al{display:flex;align-items:flex-start;gap:9px;padding:11px 14px;border-radius:8px;border:1px solid;margin-bottom:14px;font-size:13.5px}
.aw{background:#fff8e1;border-color:#ffe082;color:#e65100}.ai{background:#e3f2fd;border-color:#90caf9;color:#1565c0}.ag{background:#e8f5e9;border-color:#a5d6a7;color:#2e7d32}
.card{background:var(--sur);border-radius:14px;border:1px solid var(--bor)}
.ch{padding:13px 17px;border-bottom:1px solid var(--bor);display:flex;align-items:center;justify-content:space-between}
.ct{font-size:14px;font-weight:700;color:var(--t1);display:flex;align-items:center;gap:7px}
.cb{padding:14px 17px}
.dg{display:grid;grid-template-columns:1fr 1fr;gap:14px;margin-bottom:18px}
.cg{display:grid;grid-template-columns:1fr 1fr;gap:14px;margin-bottom:18px}
.cbw{display:flex;flex-direction:column;gap:9px}
.br1{display:flex;align-items:center;gap:10px}
.blbl{font-size:12.5px;color:var(--t2);width:115px;flex-shrink:0;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;font-weight:600}
.btr{flex:1;height:22px;background:var(--bg);border-radius:6px;overflow:hidden}
.bfi{height:100%;border-radius:6px;display:flex;align-items:center;padding-left:8px;font-size:11px;font-weight:700;color:#fff;transition:width .5s ease;min-width:26px}
.bct{font-size:13px;font-weight:800;color:var(--t2);width:28px;text-align:right;flex-shrink:0}
.dw{display:flex;align-items:center;justify-content:center;gap:22px;flex-wrap:wrap}
.dl{display:flex;flex-direction:column;gap:7px}
.dli{display:flex;align-items:center;gap:8px;font-size:13px;color:var(--t2)}
.dld{width:11px;height:11px;border-radius:50%;flex-shrink:0}
.kr{display:grid;grid-template-columns:repeat(3,1fr);gap:10px}
.kc{background:var(--bg);border:1px solid var(--bor);border-radius:10px;padding:13px 14px;text-align:center}
.kv{font-size:24px;font-weight:900;color:var(--t1)}
.kl{font-size:12px;color:var(--t3);margin-top:3px}
.sbar{display:flex;align-items:center;gap:8px;margin-bottom:14px;flex-wrap:wrap}
.sw{position:relative;flex:1;min-width:180px}
.sin{width:100%;padding:8px 12px 8px 34px;border:1.5px solid var(--bor);border-radius:8px;background:var(--sur);font-size:14px;color:var(--t1);outline:none;transition:.15s}
.sin:focus{border-color:var(--acc)}
.sic{position:absolute;left:10px;top:50%;transform:translateY(-50%);color:var(--t3);font-size:16px}
.fsl{padding:7px 11px;border:1.5px solid var(--bor);border-radius:8px;background:var(--sur);font-size:13px;color:var(--t2);cursor:pointer;outline:none}
.fsl:focus{border-color:var(--acc)}
.vt{display:flex;border:1.5px solid var(--bor);border-radius:8px;overflow:hidden}
.vb{padding:6px 11px;cursor:pointer;border:none;background:var(--sur);color:var(--t3);font-size:15px;transition:.15s}
.vb.active{background:var(--accL);color:var(--acc)}
.mg{display:grid;grid-template-columns:repeat(3,1fr);gap:13px}
.mc{background:var(--sur);border:1px solid var(--bor);border-radius:14px;padding:18px 14px 14px;cursor:pointer;transition:.18s;text-align:center;position:relative}
.mc:hover{border-color:var(--acc);transform:translateY(-2px);box-shadow:0 6px 20px var(--accS)}
.mav{width:56px;height:56px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:18px;font-weight:900;margin:0 auto 10px;border:3px solid var(--bg);overflow:hidden;flex-shrink:0}
.mav img{width:100%;height:100%;object-fit:cover}
.mhn{font-size:11px;font-weight:700;color:var(--acc);text-transform:uppercase;letter-spacing:.07em}
.mnm{font-size:14px;font-weight:800;color:var(--t1);margin-top:2px}
.mac{display:flex;gap:6px;justify-content:center;margin-top:10px}
.tw2{background:var(--sur);border-radius:14px;border:1px solid var(--bor);overflow:hidden}
table{width:100%;border-collapse:collapse}
thead{background:var(--bg)}
th{padding:10px 14px;text-align:left;font-size:12px;font-weight:700;color:var(--t3);text-transform:uppercase;letter-spacing:.06em;border-bottom:1px solid var(--bor);white-space:nowrap}
td{padding:10px 14px;font-size:13px;color:var(--t1);border-bottom:1px solid var(--bor)}
tr:last-child td{border-bottom:none}
tr:hover td{background:var(--accL)}
.tda{display:flex;align-items:center;gap:9px}
.tdn{font-weight:700;font-size:13.5px}
.tds{font-size:11.5px;color:var(--t3)}
.ov{position:fixed;inset:0;background:rgba(0,0,0,.55);z-index:200;display:flex;align-items:center;justify-content:center;padding:16px;backdrop-filter:blur(3px)}
.md{background:var(--sur);border-radius:18px;max-width:620px;width:100%;max-height:92vh;overflow-y:auto;box-shadow:0 20px 60px rgba(0,0,0,.25)}
.mh{padding:18px 20px 15px;border-bottom:1px solid var(--bor);display:flex;align-items:center;justify-content:space-between}
.mt{font-size:16px;font-weight:800;color:var(--t1);display:flex;align-items:center;gap:8px}
.mb{padding:20px}
.fg{margin-bottom:15px}
.fl{font-size:12.5px;font-weight:700;color:var(--t2);display:block;margin-bottom:5px;text-transform:uppercase;letter-spacing:.04em}
.fi{width:100%;padding:10px 12px;border:1.5px solid var(--bor);border-radius:8px;font-size:14px;color:var(--t1);background:var(--sur);outline:none;transition:.15s}
.fi:focus{border-color:var(--acc);box-shadow:0 0 0 3px var(--accS)}
.fr{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.mf{padding:14px 20px;border-top:1px solid var(--bor);display:flex;gap:9px;justify-content:flex-end}
.tip{background:var(--accL);border:1px solid var(--acc);border-radius:8px;padding:10px 14px;margin-top:8px;font-size:13px;color:var(--acc);display:flex;align-items:flex-start;gap:7px}
.sec-div{border-top:1.5px solid var(--bor);margin:18px 0 14px;padding-top:14px}
.sec-lbl{font-size:12px;font-weight:800;color:var(--t3);text-transform:uppercase;letter-spacing:.07em;margin-bottom:12px;display:flex;align-items:center;gap:6px}
.ir{display:grid;grid-template-columns:repeat(4,1fr);gap:11px;margin-bottom:18px}
.im{display:flex;align-items:center;gap:12px;background:var(--sur);border:1px solid var(--bor);border-radius:12px;padding:13px 15px}
.ii{width:42px;height:42px;border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:19px;flex-shrink:0}
.iv{font-size:24px;font-weight:900}
.il{font-size:12px;color:var(--t3)}
.pw{display:flex;align-items:center;gap:7px}
.pb{flex:1;height:6px;background:var(--bor);border-radius:3px;overflow:hidden;min-width:55px}
.pf{height:100%;border-radius:3px}
.itic{width:36px;height:36px;border-radius:8px;background:var(--bg);display:flex;align-items:center;justify-content:center;font-size:18px;flex-shrink:0}
.ech{display:inline-flex;align-items:center;gap:3px;font-size:12px;font-weight:700;padding:3px 9px;border-radius:20px}
.ml{display:flex;flex-direction:column;gap:7px}
.mr{display:flex;align-items:center;gap:10px;padding:9px 13px;background:var(--bg);border-radius:9px;border:1px solid var(--bor)}
.tog{width:40px;height:22px;border-radius:11px;cursor:pointer;transition:.15s;flex-shrink:0;position:relative;border:none}
.tog.on{background:var(--acc)}.tog.off{background:#ccc}
.tog::after{content:'';position:absolute;top:3px;width:16px;height:16px;border-radius:50%;background:#fff;transition:.15s}
.tog.on::after{left:21px}.tog.off::after{left:3px}
.mhro{background:linear-gradient(135deg,var(--sb) 0%,#1a0d05 100%);border-radius:16px;padding:28px 30px;margin-bottom:22px;display:flex;align-items:center;gap:20px}
.mhri{width:64px;height:64px;border-radius:50%;overflow:hidden;border:2px solid var(--acc);flex-shrink:0}
.mhri img{width:100%;height:100%;object-fit:cover}
.msec{margin-bottom:28px}
.msti{font-size:18px;font-weight:800;color:var(--t1);margin-bottom:18px;display:flex;align-items:center;gap:9px;padding-bottom:10px;border-bottom:2px solid var(--acc)}
.mst{background:var(--sur);border:1px solid var(--bor);border-radius:14px;margin-bottom:14px;overflow:hidden}
.msth{display:flex;align-items:flex-start;gap:14px;padding:18px 20px}
.mstn{width:38px;height:38px;border-radius:50%;background:var(--acc);color:var(--accT);font-size:17px;font-weight:900;display:flex;align-items:center;justify-content:center;flex-shrink:0;margin-top:1px}
.mstb h4{font-size:16px;font-weight:800;color:var(--t1);margin-bottom:6px}
.mstb p{font-size:14px;color:var(--t2);line-height:1.65}
.msti2{background:var(--bg);border-top:1px solid var(--bor);padding:18px 20px}
.mus{background:var(--sur);border:1.5px solid var(--bor);border-radius:10px;overflow:hidden}
.mub{background:var(--sb);padding:9px 13px;display:flex;align-items:center;gap:9px}
.muc{padding:13px 15px}
.mti{background:var(--accL);border:1px solid var(--acc);border-radius:9px;padding:11px 15px;margin-top:12px;font-size:14px;color:var(--acc);display:flex;align-items:flex-start;gap:8px;line-height:1.5}
.mwa{background:#fff8e1;border:1px solid #ffe082;border-radius:9px;padding:11px 15px;margin-top:12px;font-size:14px;color:#e65100;display:flex;align-items:flex-start;gap:8px;line-height:1.5}
.rog{display:grid;grid-template-columns:repeat(3,1fr);gap:14px;margin-top:16px}
.roc{border-radius:14px;padding:18px;text-align:center;border:2px solid transparent}
.roc.adm{background:#FBF4E2;border-color:var(--acc)}
.roc.dir{background:#e8f0fa;border-color:#1565C0}
.roc.mem{background:#e8f5e9;border-color:#2e7d32}
.roi{font-size:30px;margin-bottom:9px}
.ron{font-size:15px;font-weight:800;color:var(--t1);margin-bottom:6px}
.rod{font-size:13px;color:var(--t2);line-height:1.5}
.pvb{background:linear-gradient(135deg,#0a1f3c,#1a3a6b);border-radius:14px;padding:24px 26px;margin-bottom:24px;display:flex;align-items:flex-start;gap:18px}
.pvi{font-size:34px;flex-shrink:0;margin-top:2px}
.pvt h3{font-size:17px;font-weight:800;color:#fff;margin-bottom:7px}
.pvt p{font-size:13.5px;color:rgba(255,255,255,.8);line-height:1.65}
.tgr{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-bottom:16px}
.spd{background:var(--accL);border:1.5px solid var(--acc);border-radius:12px;padding:16px 18px;display:flex;align-items:center;gap:14px}
.spa{width:50px;height:50px;border-radius:50%;overflow:hidden;border:2px solid var(--acc);flex-shrink:0;background:var(--bg);display:flex;align-items:center;justify-content:center;font-size:17px;font-weight:800;color:var(--acc)}
.spa img{width:100%;height:100%;object-fit:cover}
.spi{flex:1;min-width:0}
.spn{font-size:15px;font-weight:800;color:var(--t1)}
.spr{font-size:12.5px;color:var(--acc);font-weight:600;margin-bottom:4px}
.spc{font-size:13px;color:var(--t2)}
@media(max-width:960px){.sr,.ir{grid-template-columns:1fr 1fr}.mg{grid-template-columns:1fr 1fr}.dg,.cg{grid-template-columns:1fr}.rog{grid-template-columns:1fr}}
@media(max-width:620px){.mg{grid-template-columns:1fr}.sr{grid-template-columns:1fr 1fr}}
.rpt-grid{display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-bottom:20px}
.rpt-card{background:var(--sur);border:1px solid var(--bor);border-radius:14px;padding:20px;cursor:pointer;transition:.18s}
.rpt-card:hover{border-color:var(--acc);box-shadow:0 4px 16px var(--accS);transform:translateY(-2px)}
.rpt-icon{width:52px;height:52px;border-radius:12px;display:flex;align-items:center;justify-content:center;font-size:24px;margin-bottom:13px}
.rpt-title{font-size:16px;font-weight:800;color:var(--t1);margin-bottom:5px}
.rpt-desc{font-size:13px;color:var(--t3);line-height:1.55;margin-bottom:12px}
.rpt-actions{display:flex;gap:8px;flex-wrap:wrap}
.rpt-preview{background:var(--sur);border:1px solid var(--bor);border-radius:14px;overflow:hidden;margin-bottom:20px}
.rpt-ph{padding:14px 18px;border-bottom:1px solid var(--bor);display:flex;align-items:center;justify-content:space-between;background:var(--bg)}
.rpt-pt{font-size:14px;font-weight:800;color:var(--t1);display:flex;align-items:center;gap:8px}
.rpt-meta{font-size:12px;color:var(--t3);margin-top:2px}
</style>

  useEffect(()=>{if(loading||!mins)return;cSv('inp:mins',mins).then(ok=>{if(ok)setSync(new Date().toLocaleTimeString('es-MX'))});},[mins,loading]);
  useEffect(()=>{if(loading||!soporte)return;cSv('inp:soporte',soporte);},[soporte,loading]);
  useEffect(()=>{if(loading)return;cSv('inp:eventos',eventos);},[eventos,loading]);

  function hLogo(data){setLogo(data);cSv('inp:logo',{logo:data}).then(()=>toast('Logo actualizado ☁️'));}
  function doLogin(user){const fresh=miembros.find(m=>m.id===user.id)||user;setCu(fresh);setLoggedIn(true);toast('¡Bienvenido/a, '+(fresh.genero==='f'?'Hna.':'Hno.')+' '+fresh.nombre.split(' ')[0]+'! 🙏');}
  function doLogout(){setLoggedIn(false);setCu(null);setPage('dashboard');toast('Sesión cerrada. ¡Hasta pronto!','info');}

  const isA=cu&&cu.sysRol===ROL_A;
  const isD=cu&&cu.sysRol===ROL_D;
  const isMin=cu&&cu.sysRol===ROL_MIN;
  const TITLES={dashboard:'Panel Principal',relaciones:'Directorio de Relaciones',inventarios:'Control de Inventario',reportes:'Centro de Reportes',config:'Configuración',temas:'Personalizar',manual:'Ayuda y Manual',calendario:'Calendario de Actividades'};

  if(loading)return h('div',{style:{display:'flex',alignItems:'center',justifyContent:'center',height:'100vh',background:'#0A0A0A',fontSize:15,color:'#C8952A',flexDirection:'column',gap:14}},h('i',{className:'ti ti-cloud',style:{fontSize:40}}),h('div',null,'Conectando de forma segura...'),h('div',{style:{fontSize:12,color:'rgba(200,149,42,.6)',marginTop:4}},'Sistema privado INP El Buen Pastor'));
  if(!loggedIn)return h('div',{style:{width:'100%'}},h(ToastArea,{ts}),h(Login,{miembros,onLogin:doLogin}));

  return h('div',{style:{display:'flex',width:'100%',minHeight:'100vh',background:'var(--bg)'}},
    h(ToastArea,{ts}),
    h(Sidebar,{page,onNav:setPage,logo,onLogoCh:hLogo,cu,onLogout:doLogout,mins}),
    h('div',{className:'mn'},
      h('div',{className:'tb'},
        h('div',null,h('div',{className:'tbt'},h('i',{className:'ti ti-church',style:{marginRight:8,color:'var(--acc)'}}), 'INP El Buen Pastor — '+TITLES[page])),
        h('div',{style:{display:'flex',gap:8,alignItems:'center'}},
          sync&&h('div',{className:'sych'},h('i',{className:'ti ti-cloud-check'}),'Guardado '+sync),
          (isA||isD)&&h('button',{className:'ib',onClick:()=>setPage('config'),title:'Configuración'},h('i',{className:'ti ti-settings'})),
          h('div',{className:'uav',style:{width:32,height:32,fontSize:12,cursor:'pointer'},onClick:()=>setPage('config'),title:'Mi perfil'},cu.foto?h('img',{src:cu.foto,style:{width:'100%',height:'100%',objectFit:'cover'}}):gi(cu.nombre))
        )
      ),
      page==='dashboard'&&h(Dashboard,{onNav:setPage,miembros,inv,mins,cu,sync}),
      page==='relaciones'&&(cu.sysRol===ROL_M?h('div',{className:'pg'},h('div',{className:'al aw'},h('i',{className:'ti ti-lock'}),' No tienes acceso a este módulo.')):h(Relaciones,{miembros,setMiembros,mins,cu,toast})),
      page==='inventarios'&&(cu.sysRol===ROL_M?h('div',{className:'pg'},h('div',{className:'al aw'},h('i',{className:'ti ti-lock'}),' No tienes acceso a este módulo.')):h(Inventarios,{inv,setInv,mins,miembros,cu,toast})),
      page==='reportes'&&h(Reportes,{miembros,inv,mins,cu}),
      page==='calendario'&&h(Calendario,{cu,mins,miembros,eventos,setEventos,toast}),
      page==='config'&&(cu.sysRol===ROL_M||cu.sysRol===ROL_MIN?h('div',{className:'pg'},h('div',{className:'al aw'},h('i',{className:'ti ti-lock'}),' Solo Administradores y Directores pueden acceder a Configuración.')):h('div',null,isA&&showMatriz&&h(MatrizPermisos,{miembros,mins,onClose:()=>setShowMatriz(false),toast}),h(Config,{mins,setMins,cu,miembros,setMiembros,soporte,setSoporte,toast,onShowMatriz:()=>setShowMatriz(true)}))),
      page==='temas'&&h(Temas,{thIdx,setThIdx,toast}),
      page==='manual'&&h(Manual,{soporte,miembros,logo})
    )
  );
}
ReactDOM.render(h(App,null),document.getElementById('root'));
</script>
</body>
</html>
